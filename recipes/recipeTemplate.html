<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../recipeStyle.css">
    <title><!--Name as shown on browser tab--></title> 
</head>
<body>
    <div class="header">
        <h1><!--Recipe name as shown on header--></h1>
    </div>
    <div class="content">
        <!--Recipe image. Make sure it's in the right place!!!!-->
        <img src= "../img/" alt="" width="auto" height="200px">
    <div class="recipeInfo">
        <div class="card">
            <div class="subheader">
                <h3>Ingredients</h3>
            </div>
            <ul>
                <li><!--Ingredient list, use <li></li> for each one in list--></li>
            </ul>  
            <p><!--Optional for notes--></p>
        </div>
        <div class="card">
            <div class="subheader">
                <h3>Preparation</h3>
            </div>
            <ol>
                <li><!--Prep step list, use <li></li> for each one in list--></li>
            </ol>
        </div>
        <div class="card">
            <div class="subheader">    
                <h4>Additional notes:</h4>
            </div>
            <ul>
                <li><!--Additional notes that don't fit anywhere else, use <li></li> for each one in list--></li>
            </ul>
        </div>
    </div>
    </div>
    <div class="footer">
        <div class="return">
            <a href="../index.html">I'm scared and I want to leave (I am a coward)</a>
        </div>
    </div>
</body>
</html>
